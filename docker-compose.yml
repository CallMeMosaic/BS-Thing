version: '3.8'

services:
  rag-llm:
    image: ollama/ollama:latest
    container_name: rag-llm
    ports:
      - "11434:11434"
    volumes:
      - ./data/rag-llm:/root/.ollama
    environment:
      - LLM_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - rag-network

  rag-server:
    build: ./rag-server
    container_name: rag-server
    ports:
      - "8080:8080"
    volumes:
      - ./data/documents:/app/RAG-Server/documents
    environment:
      - LLM_HOST=rag-llm
      - LLM_PORT=11434
    depends_on:
      rag-llm:
        condition: service_healthy
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge